<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open-Meteo Weather</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://api.open-meteo.com">
  <link rel="preconnect" href="https://geocoding-api.open-meteo.com">
</head>
<body>
  <header class="app-header">
    <h1>Weather</h1>
    <div class="controls">
      <form id="search-form" autocomplete="off">
        
        <div class="inp-sugg">
          

          <input id="search-input" type="text" placeholder="Search city (e.g., Berlin, Delhi)" />
          <ul id="suggestions">
          </ul>
        </div>
        
          <!--
        <button class="btn" style="display: none;" type="submit" title="Search">Search</button>
        -->
        
      </form>
      <button id="geo-btn" class="btn outline" title="Use my location">📍 Current</button>
      <button id="units-btn" class="btn" title="Toggle units">°C / °F</button>
    </div>
    <p id="status" class="status"></p>
  </header>

  <main class="container">
    <section class="panel location">
      <h2 id="place-name">—</h2>
      <p id="coords">Lat —, Lon —</p>
      <p id="elevation">Elevation — m</p>
      <p id="model">Model: auto</p>
      <p id="updated">Updated: —</p>
    </section>

    <section class="panel now">
      <h2>Now</h2>
      <div class="now-grid">
        <div class="big-temp">
          <div id="now-icon" class="wx-icon">☀️</div>
          
          <div>
            <div id="now-temp" class="temp">—</div>
            <div id="now-desc" class="subtle">—</div>
            <div id="sun">
              <span id="sunrise">sunrise:  </span>
              <span id="sunset">sunset:</span>
            </div>
          </div>
        </div>
        <ul class="kv">
          <li><span>Feels like</span><strong id="now-feels">—</strong></li>
          <li><span>Humidity</span><strong id="now-humidity">—</strong></li>
          <li><span>Wind</span><strong id="now-wind">—</strong></li>
          <li><span>Pressure</span><strong id="now-pressure">—</strong></li>
          <li><span>Cloud cover</span><strong id="now-clouds">—</strong></li>
          <li><span>Precip (rain)</span><strong id="now-precip">—</strong></li>
        </ul>
      </div>
    </section>

    <section class="panel hourly">
      <h2>Next 24 hours</h2>
      <div id="hourly-scroll" class="scroll-row"></div>
    </section>
    
    <section class="panel minutely">
      <h2>Next ~2 hours (15-min)</h2>
      <div id="minutely-scroll" class="scroll-row"></div>
    </section>

    <section class="panel daily">
      <h2>Next 7 days</h2>
      <div id="daily-grid" class="grid-7"></div>
    </section>
  </main>

  <footer class="app-footer">
    <p>Data: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> • Free & No API key</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
